<!DOCTYPE html>
<html>

<head>

    <title>Event Details - EventHub</title>

    <link rel="stylesheet" href="style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

    <header>

        <div class="logo">EventHub</div>

        <div class="menu-toggle">☰</div>

        <nav id="navMenu">

            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            

        </nav>


    </header>


    <main>

        <div id="eventDetails" class="details-container"></div>

    </main>


    <footer class="footer">

        <div class="footer-container">

            <div class="footer-box">
                <h3>EventHub</h3>
                <p>Your one-stop platform to discover amazing events near you.</p>
            </div>

            <div class="footer-box">
                <h3>Quick Links</h3>
                <a href="index.html">Home</a>
                <a href="events.html">Events</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>

            <div class="footer-box">
                <h3>Contact</h3>
                <p>Email: info@eventhub.com</p>
                <p>Phone: +91 9876543210</p>
                <p>Location: Gujarat, India</p>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 EventHub. All Rights Reserved.</p>
        </div>

    </footer>


    <script src="events.js"></script>
    <script src="script.js"></script>

    <script>

        let params = new URLSearchParams(window.location.search)

        let id = params.get("id")

        let event = events.find(e => e.id == id)

        if (event) {

            document.getElementById("eventDetails").innerHTML = `

<img src="${event.image}" class="details-image">

<h1>${event.title}</h1>

<p><b>Date:</b> ${event.date}</p>

<p><b>Time:</b> ${event.Time}</p>

<p><b>Location:</b> ${event.location}</p>

<p><b>Organizer:</b> EventHub Team</p>

<p><b>Ticket:</b> ${event.Ticket}</p>

<p>${event.description}</p>

<a href="events.html" class="back-btn">⬅ Back to Events</a>

`

        }

    </script>

</body>

</html>
